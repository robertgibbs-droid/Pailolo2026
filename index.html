<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pailolo 2026">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0D1B2A">
<title>Pailolo 2026 — Team App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F2F2EE;color:#1a1a1a;min-height:100vh}
.hdr{background:#0D1B2A;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20;flex-wrap:wrap}
.hdr-title{flex:1;min-width:160px}
.hdr-title h1{font-size:13px;font-weight:600}
.hdr-title p{font-size:10px;opacity:.5;margin-top:1px}
.who-wrap{display:flex;align-items:center;gap:7px}
.who-label{font-size:10px;font-weight:600;opacity:.6;white-space:nowrap}
.who-select{padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:#fff;font-size:12px;font-weight:500;cursor:pointer;outline:none;min-width:140px}
.who-select option{color:#1a1a1a;background:#fff}
.mode-toggle{display:flex;border:1px solid rgba(255,255,255,.25);border-radius:6px;overflow:hidden;flex-shrink:0}
.mbtn{padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.4);letter-spacing:.04em;transition:all .15s}
.mbtn.on{background:rgba(255,255,255,.18);color:#fff}
.conn-dot{width:7px;height:7px;border-radius:50%;background:#E74C3C;display:inline-block;margin-right:4px;transition:background .2s}
.conn-dot.live{background:#27AE60}
.conn-txt{font-size:9px;color:rgba(255,255,255,.5)}
.nav{background:#fff;border-bottom:1px solid #E0E0D8;padding:8px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:49px;z-index:10}
.nbtn{background:#F5F5F0;border:1px solid #D0D0C8;border-radius:6px;padding:4px 13px;font-size:15px;cursor:pointer;color:#1a1a1a}
.nbtn:disabled{opacity:.3;cursor:default}
.nbtn:hover:not(:disabled){background:#EAEAE5}
.nc{flex:1;text-align:center}
.nwk{font-size:13px;font-weight:600}
.ndates{font-size:10px;color:#888;margin:1px 0}
.ph-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:3px;color:#fff;letter-spacing:.04em}
.dots{display:flex;gap:3px;padding:5px 16px 0}
.dot{height:5px;flex:1;border-radius:3px;cursor:pointer;opacity:.3;transition:opacity .12s}
.dot.on{opacity:1}.dot:hover{opacity:.65}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px 16px 28px}
.cards>.prof-page{grid-column:1 / -1}
.card{background:#fff;border:1px solid #E0E0D8;border-radius:12px;overflow:hidden}
.card-head{padding:9px 12px;border-bottom:1px solid rgba(0,0,0,.07)}
.hrow{display:flex;align-items:center;gap:5px;margin-bottom:4px;flex-wrap:wrap}
.day-lbl{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;color:#fff;letter-spacing:.05em;text-transform:uppercase}
.sys-tag{font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px}
.card-body{padding:9px 12px}
.sl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#BBBBB0;margin-bottom:2px}
.sec{margin-bottom:7px}
.fv{white-space:pre-wrap;font-size:11px;line-height:1.58;color:#1a1a1a;padding:3px 5px;border-radius:4px;min-height:16px}
.fv.editable{cursor:text;border:1.5px dashed transparent}
.fv.editable:hover{border-color:#C8C8C0;background:#FAFAF7}
.fta{width:100%;font-family:inherit;font-size:11px;line-height:1.58;padding:3px 5px;border-radius:4px;border:1.5px solid #4A90D9;background:#fff;color:#1a1a1a;resize:vertical;outline:none}
.tot-bar{background:#F5F5F0;border-radius:4px;padding:4px 8px;margin-top:4px;font-size:10px;color:#666}
.log-section{border-top:2px dashed #E0E0D8;margin-top:8px;padding:10px 12px 12px;background:#FAFAF8}
.log-head{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#4A90D9;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.log-head::after{content:'';flex:1;height:1px;background:#D8E8F8}
.log-name{font-size:11px;font-weight:600;color:#1a1a1a;margin-bottom:7px;background:#E8F3FB;padding:4px 8px;border-radius:5px;display:flex;align-items:center;gap:5px}
.lock-icon{font-size:10px;color:#4A90D9}
.att-row{display:flex;gap:5px;margin-bottom:7px}
.att-btn{flex:1;padding:5px 3px;font-size:10px;font-weight:600;border-radius:5px;cursor:pointer;border:1.5px solid #E0E0D8;background:#fff;color:#999;transition:all .12s;text-align:center}
.att-btn.y.on{background:#D5F5E3;border-color:#27500A;color:#27500A}
.stat-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.stat-label{font-size:10px;color:#888;min-width:62px;flex-shrink:0}
.stat-input{flex:1;font-family:inherit;font-size:11px;padding:4px 7px;border:1px solid #D8D8D0;border-radius:5px;background:#fff;color:#1a1a1a;outline:none}
.stat-input:focus{border-color:#4A90D9;box-shadow:0 0 0 2px rgba(74,144,217,.12)}
.stat-unit{font-size:10px;color:#AAA;white-space:nowrap}
.strava-row{margin-bottom:6px}
.strava-input{width:100%;font-family:inherit;font-size:10px;padding:4px 7px;border:1px solid #D8D8D0;border-radius:5px;background:#fff;color:#1a1a1a;outline:none}
.strava-input:focus{border-color:#FC4C02;box-shadow:0 0 0 2px rgba(252,76,2,.12)}
.strava-link{display:flex;align-items:center;gap:5px;margin-top:3px;font-size:10px;color:#FC4C02;font-weight:600;text-decoration:none}
.strava-link:hover{text-decoration:underline}
.notes-ta{width:100%;font-family:inherit;font-size:11px;line-height:1.55;padding:4px 7px;border:1px solid #D8D8D0;border-radius:5px;background:#fff;color:#1a1a1a;resize:vertical;outline:none;min-height:40px}
.notes-ta:focus{border-color:#4A90D9;box-shadow:0 0 0 2px rgba(74,144,217,.12)}
.save-row{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:9px;border-top:1px solid #E0E8F0;flex-wrap:wrap}
.save-btn{background:#4A90D9;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.save-btn:hover{background:#3A7BC0}
.save-btn:active{transform:scale(0.97)}
.save-status{font-size:10px}
.save-status.dirty{color:#D97706;font-weight:600}
.save-status.ok{color:#27AE60;font-weight:600}
.save-status.err{color:#E74C3C;font-weight:600}
.coach-save-bar{display:flex;align-items:center;gap:6px;font-size:10px;margin-left:auto}
.roster-section{border-top:2px dashed #E0E0D8;margin-top:8px;padding:8px 12px 10px;background:#F8F8F5}
.roster-head{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#666;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.roster-head::after{content:'';flex:1;height:1px;background:#DDD}
.roster-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px}
.roster-row{display:flex;align-items:center;gap:5px;padding:3px 5px;border-radius:4px;font-size:10px}
.roster-row:hover{background:#F0F0E8}
.r-name{flex:1;font-weight:500;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#E0E0D8}
.r-dot.y{background:#27AE60}
.roster-stats{font-size:9px;color:#AAA;display:flex;gap:3px;flex-wrap:wrap}
.r-stat{background:#EEEEE8;padding:1px 4px;border-radius:2px;color:#666}
.roster-legend{display:flex;gap:8px;margin-bottom:5px;font-size:9px;color:#999}
.leg-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:2px;vertical-align:middle}
.no-paddler{font-size:11px;color:#AAA;font-style:italic;padding:8px 0}
.resources-section{border-top:2px dashed #E0E0D8;margin-top:8px;padding:9px 12px 2px}
.resources-head{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#8B6F2E;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.resources-head::after{content:'';flex:1;height:1px;background:#EDE0C0}
.res-link{color:#4A90D9;text-decoration:none;word-break:break-all}
.res-link:hover{text-decoration:underline}
.hint{text-align:center;font-size:10px;color:#AAA;padding:5px 16px 14px}
.crew-section{border-top:2px dashed #E0E0D8;margin-top:8px;padding:9px 12px 10px;background:#F5F8FB}
.crew-head{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#1E5A8A;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.crew-head::after{content:'';flex:1;height:1px;background:#D8E4F0}
.crew-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:2px}
@media(max-width:600px){.crew-grid{grid-template-columns:1fr}}
.crew-box{background:#fff;border:1px solid #DCE6EE;border-radius:8px;padding:8px 9px}
.crew-box-title{font-size:10px;font-weight:700;color:#0D1B2A;margin-bottom:6px}
.crew-seat-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.crew-seat-n{width:16px;height:16px;border-radius:50%;background:#EBF0FB;color:#185FA5;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.crew-seat-select{flex:1;font-family:inherit;font-size:11px;padding:3px 5px;border:1px solid #D8D8D0;border-radius:4px;background:#fff;color:#1a1a1a;outline:none;min-width:0}
.crew-seat-ro{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px}
.crew-seat-name{color:#333}
.crew-spd-row{display:flex;align-items:center;gap:6px;margin-top:6px;padding-top:6px;border-top:1px dashed #EEF2F6}
.crew-spd-input{width:60px;font-family:inherit;font-size:11px;padding:3px 6px;border:1px solid #D8D8D0;border-radius:4px;outline:none}
.crew-notes-ta{width:100%;font-family:inherit;font-size:10px;line-height:1.5;padding:4px 6px;border:1px solid #D8D8D0;border-radius:4px;margin-top:5px;resize:vertical;outline:none;min-height:32px}
.crew-comments{margin-top:7px}
.crew-comment-item{background:#fff;border:1px solid #EEF2F6;border-radius:6px;padding:5px 8px;margin-bottom:5px;font-size:11px;line-height:1.5}
.crew-comment-who{font-weight:700;color:#185FA5;margin-right:5px}
.crew-comment-del{background:none;border:none;color:#CCC;cursor:pointer;font-size:11px;float:right}
.crew-comment-del:hover{color:#E74C3C}
.crew-comment-add{display:flex;gap:6px;margin-top:6px}
.crew-comment-input{flex:1;font-family:inherit;font-size:11px;padding:5px 7px;border:1px solid #D8D8D0;border-radius:5px;outline:none}
.crew-comment-btn{background:#4A90D9;color:#fff;border:none;border-radius:5px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.crew-comment-btn:hover{background:#3A7BC0}
@media(max-width:760px){.cards{grid-template-columns:1fr}}
.pre-block{background:#F0F4FF;border-radius:6px;padding:8px 10px;margin-bottom:8px;border:1px solid #D8E4F8}
.pre-head{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#4A6FA5;margin-bottom:7px}
.e-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.e-btn{width:32px;height:32px;border-radius:6px;border:1.5px solid #D0D0C8;background:#fff;color:#888;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.e-btn:hover{border-color:#999;color:#333}
.e-btn.e-on{font-weight:800}
.e-tip{font-size:10px;color:#888;font-style:italic;margin-left:4px}
#season-summary{padding:0 16px 20px}
.season-panel{background:#fff;border:1px solid #E0E0D8;border-radius:12px;overflow:hidden}
.season-head{background:#0D1B2A;color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.season-totals{font-size:11px;font-weight:400;letter-spacing:0}
.wt-row{display:flex;gap:0;border-bottom:1px solid #E8E8E0;overflow-x:auto;background:#F8F8F5;padding:6px 12px}
.wt-col{min-width:42px;text-align:center;padding:2px 4px;border-radius:4px;flex-shrink:0}
.wt-col.wt-cur{background:#E8F3FB}
.wt-wk{font-size:9px;color:#AAA;font-weight:600;text-transform:uppercase}
.wt-cnt{font-size:14px;font-weight:700;line-height:1.2}
.wt-max{font-size:9px;color:#CCC}
.sum-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0;padding:4px 8px 8px}
.sum-row{display:flex;align-items:center;gap:6px;padding:4px 4px;border-radius:4px}
.sum-row:hover{background:#F8F8F5}
.sum-name{font-size:11px;font-weight:500;color:#333;min-width:88px;flex-shrink:0}
.sum-bar-track{flex:1;height:5px;background:#EEEEE8;border-radius:3px;overflow:hidden}
.sum-bar{height:100%;border-radius:3px;transition:width .3s}
.sum-nums{font-size:11px;font-weight:700;min-width:30px;text-align:right}
.sum-pct{font-size:10px;font-weight:600;min-width:32px;text-align:right}
@media(max-width:600px){.sum-grid{grid-template-columns:1fr}}
.prof-page{display:flex;gap:0;min-height:500px;border:1px solid #E0E0D8;border-radius:12px;overflow:hidden;background:#fff;margin:0}
.pl-sidebar{width:164px;flex-shrink:0;border-right:1px solid #E8E8E0;background:#F8F8F5;overflow-y:auto;max-height:640px}
.pl-head{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#AAA;padding:9px 10px 6px;border-bottom:1px solid #E8E8E0}
.pl-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;cursor:pointer;border-bottom:0.5px solid #F0F0E8;transition:background .1s}
.pl-item:hover{background:#F0F0E8}
.pl-item.pl-sel{background:#EBF0FB;border-left:3px solid #185FA5}
.pl-name{font-size:11px;font-weight:500;color:#1a1a1a}
.pl-att{font-size:10px;font-weight:600}
.prof-main{flex:1;min-width:0;overflow:hidden}
.prof-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:12px 14px 10px;border-bottom:1px solid #F0F0E8;background:#FAFAF8;flex-wrap:wrap}
.prof-hdr-left{flex:1;min-width:0}
.prof-name-big{font-size:17px;font-weight:700;color:#0D1B2A;margin-bottom:5px}
.prof-strava-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.strava-prof-link{font-size:11px;color:#FC4C02;font-weight:600;text-decoration:none;white-space:nowrap}
.strava-prof-link:hover{text-decoration:underline}
.strava-prof-input{font-family:inherit;font-size:10px;padding:3px 7px;border:1px dashed #D0D0C8;border-radius:4px;color:#888;background:transparent;outline:none;min-width:180px}
.strava-prof-input:focus{border-color:#FC4C02;background:#fff}
.prof-stats-row{display:flex;gap:12px;flex-shrink:0}
.prof-stat{text-align:center;min-width:40px}
.prof-stat-n{font-size:20px;font-weight:700;line-height:1.1}
.prof-stat-l{font-size:9px;color:#AAA;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.chart-section{padding:8px 14px 0}
.chart-lbl{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#AAA;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.chart-legend{display:flex;align-items:center;gap:5px;font-size:9px;color:#999;font-weight:400;letter-spacing:0;text-transform:none;margin-left:auto}
.cleg-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.chart-inner{background:#FAFAF8;border:1px solid #EEEEE8;border-radius:8px;padding:14px 10px 6px;margin-bottom:0;min-height:220px}
.chart-empty{padding:24px;text-align:center;color:#CCC;font-size:11px;font-style:italic}
.metric-grid{display:grid;grid-template-columns:1fr;gap:22px;padding:8px 14px 20px}
.metric-card{background:#FAFAF8;border:1px solid #EEEEE8;border-radius:10px;padding:18px}
.metric-card-title{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#666;margin-bottom:12px}
.metric-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.metric-big{display:flex;align-items:baseline;gap:10px}
.metric-big-num{font-size:28px;font-weight:800;line-height:1}
.metric-big-unit{font-size:13px;color:#AAA;font-weight:600}
.metric-trend{font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px;background:#F0F0EA;color:#888}
.metric-trend.up{background:#FCEFEA;color:#B9540A}
.metric-trend.down{background:#EAF3FC;color:#1B5FA8}
.metric-dual{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.metric-dual-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#BBB;margin-bottom:4px}
@media(max-width:680px){.metric-dual{grid-template-columns:1fr}}
@media(max-width:600px){.metric-grid{grid-template-columns:1fr}}
.pt-table{width:100%;border-collapse:collapse;font-size:11px}
.pt-th{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#999;padding:6px 8px;text-align:left;background:#F8F8F5;border-bottom:1px solid #E8E8E0;white-space:nowrap}
.pt-row:hover{background:#FAFAF8}
.pt-cell{padding:5px 8px;border-bottom:0.5px solid #F4F4F0;vertical-align:middle;white-space:nowrap}
.pt-empty{padding:20px;text-align:center;color:#CCC;font-style:italic}
.pt-wk{color:#888;font-size:10px}
.pt-day{font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px}
.pt-sess{max-width:110px;overflow:hidden;text-overflow:ellipsis;color:#666;font-size:10px;white-space:nowrap}
.pt-hr{min-width:52px}
.tt-nav-btn{padding:4px 12px;font-size:11px;font-weight:600;border:1px solid #D0D0C8;border-radius:5px;cursor:pointer;background:#F5F5F0;color:#666}
.tt-nav-btn.tt-nav-on{background:#0D1B2A;color:#fff;border-color:#0D1B2A}
.tt-nav-btn:hover:not(.tt-nav-on){background:#EAEAE5}
.pin-dot{width:12px;height:12px;border-radius:50%;border:1.5px solid #D0D0C8;background:#fff}
.pin-dot.filled{background:#0D1B2A;border-color:#0D1B2A}
.pin-key{padding:12px 0;font-size:16px;font-weight:600;border:1px solid #E0E0D8;border-radius:8px;background:#F8F8F5;cursor:pointer;color:#1a1a1a}
.pin-key:hover{background:#EFEFEA}
.pin-clear,.pin-cancel{color:#888}
.loading-box{padding:60px 20px;text-align:center;color:#999;font-size:12px}
.setup-box{max-width:520px;margin:60px auto;background:#fff;border:1px solid #E0E0D8;border-radius:12px;padding:28px;font-size:13px;line-height:1.6}
.setup-box h2{font-size:16px;margin-bottom:10px}
.setup-box code{background:#F5F5F0;padding:2px 5px;border-radius:4px;font-size:12px}
.ttr-section{padding:10px 14px 16px;border-top:1px solid #F0F0E8}
.ttr-section-head{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#AAA;margin-bottom:8px}
.ttr-tabs{display:flex;gap:6px;margin-bottom:10px}
.ttr-tab-btn{padding:5px 14px;font-size:11px;font-weight:700;border:1px solid #D0D0C8;border-radius:6px;cursor:pointer;background:#F5F5F0;color:#666}
.ttr-tab-btn.ttr-tab-on{background:#0D1B2A;color:#fff;border-color:#0D1B2A}
.ttr-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:10px}
.ttr-th{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#999;padding:6px 6px;text-align:left;background:#F8F8F5;border-bottom:1px solid #E8E8E0;white-space:nowrap}
.ttr-cell{padding:5px 6px;border-bottom:0.5px solid #F4F4F0;vertical-align:middle}

const RACE_DATE=new Date('2026-09-19T07:00:00-10:00');
function updateCountdown(){
  const el=document.getElementById('countdown-numbers');
  if(!el) return;
  const diff=RACE_DATE-new Date();
  if(diff<=0){ el.innerHTML='🏆 RACE DAY IS HERE — GO GET IT!'; return; }
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  el.innerHTML=`<span class="cd-num">${d}</span><span class="cd-unit">d</span> <span class="cd-num">${String(h).padStart(2,'0')}</span><span class="cd-unit">h</span> <span class="cd-num">${String(m).padStart(2,'0')}</span><span class="cd-unit">m</span> <span class="cd-num">${String(s).padStart(2,'0')}</span><span class="cd-unit">s</span>`;
}

function exerciseInstructionsBlock(exercises,category){
  if(!['strength','mobility'].includes(category)) return '';
  const names=(exercises||[]).map(x=>x.name==='__custom__'?(x.customName||''):x.name).filter(n=>n && WEX_INFO[n]);
  const unique=[...new Set(names)];
  if(!unique.length) return '';
  return `<div style="background:#F8F8F5;border:1px solid #EEEEE8;border-radius:8px;padding:10px 12px;margin-bottom:10px">
    <div class="sl" style="margin-bottom:6px">How to</div>
    ${unique.map(n=>`<div style="font-size:11px;line-height:1.5;margin-bottom:5px"><b>${esc(n)}:</b> ${esc(WEX_INFO[n])}</div>`).join('')}
  </div>`;
}
function exerciseOptionsHTML(cat,selected){
  if(WEXLIB_GROUPED[cat]){
    return Object.entries(WEXLIB_GROUPED[cat]).map(([grp,items])=>{
      const opts=[...items].sort((a,b)=>a.localeCompare(b)).map(w=>`<option value="${esc(w)}" ${selected===w?'selected':''}>${esc(w)}</option>`).join('');
      return `<optgroup label="${esc(grp)}">${opts}</optgroup>`;
    }).join('');
  }
  return (WEXLIB[cat]||[]).slice().sort((a,b)=>a.localeCompare(b)).map(w=>`<option value="${esc(w)}" ${selected===w?'selected':''}>${esc(w)}</option>`).join('');
}

function timeAgo(d){
  if(!d) return '';
  const s=Math.floor((Date.now()-d.getTime())/1000);
  if(s<10) return 'just now';
  if(s<60) return `${s}s ago`;
  const m=Math.floor(s/60);
  if(m<60) return `${m}m ago`;
  return `${Math.floor(m/60)}h ago`;
}
async function fsLoad(name){
  if(!fbReady) return null;
  try{
    const snap=await TEAM.doc(name).get();
    return snap.exists ? snap.data().json : null;
  }catch(e){ console.error('load failed',name,e); return null; }
}
async function fsSave(name,obj){
  if(!fbReady) return false;
  try{
    await TEAM.doc(name).set({json:JSON.stringify(obj),updatedAt:Date.now()});
    return true;
  }catch(e){ console.error('save failed',name,e); return false; }
}

function crewTrendChart(){
  const dayOrder=['mon','thu','sat'];
  const pts=[];
  W.forEach((w,wi)=>{
    dayOrder.forEach(day=>{
      const c=crewData[crewKey(wi,day)];
      const a=(c&&c.A&&c.A.spd)?parseFloat(c.A.spd):NaN;
      const b=(c&&c.B&&c.B.spd)?parseFloat(c.B.spd):NaN;
      if(!isNaN(a)||!isNaN(b)) pts.push({wi,day,label:`W${w.n} ${DAYS[day].label.slice(0,3)}`,a,b});
    });
  });
  if(!pts.length) return `<div class="chart-empty" style="min-height:200px;display:flex;align-items:center;justify-content:center">No crew speed data logged yet</div>`;
  const W2=1400,H=300,PL=54,PR=110,PT=20,PB=40;
  const allVals=pts.flatMap(p=>[p.a,p.b]).filter(v=>!isNaN(v));
  const mn=Math.min(...allVals),mx=Math.max(...allVals);
  const pad=((mx-mn)*0.2)||0.5;
  const lo=Math.max(0,mn-pad), hi=mx+pad;
  const xStep=(W2-PL-PR)/Math.max(pts.length-1,1);
  const xOf=i=>PL+i*xStep;
  const yS=v=>PT+(H-PT-PB)*(1-(v-lo)/((hi-lo)||1));
  function seriesPath(key,color){
    const valid=pts.map((p,i)=>({i,v:p[key]})).filter(x=>!isNaN(x.v));
    if(!valid.length) return '';
    const path=valid.map((x,idx)=>`${idx===0?'M':'L'}${xOf(x.i).toFixed(1)},${yS(x.v).toFixed(1)}`).join(' ');
    const dots=valid.map(x=>`<circle cx="${xOf(x.i).toFixed(1)}" cy="${yS(x.v).toFixed(1)}" r="5.5" fill="${color}" stroke="#fff" stroke-width="2"><title>${esc(pts[x.i].label)}: ${x.v.toFixed(1)} mph</title></circle>`).join('');
    return `<path d="${path}" fill="none" stroke="${color}" stroke-width="3" opacity="0.85" stroke-linejoin="round"/>${dots}`;
  }

function metricChart(sessions,field,color,digits,mode){
  const W2=700,H=280,PL=52,PR=18,PT=20,PB=40;
  const DC={mon:'#E74C3C',thu:'#3498DB',sat:'#27AE60'};
  const valid=sessions.map(s=>{
    const raw=s[field];
    const v=(raw===null||raw===undefined||raw==='')?NaN:parseFloat(raw);
    return {s,v};
  }).filter(x=>!isNaN(x.v));
  if(!valid.length) return `<div class="chart-empty" style="min-height:220px;display:flex;align-items:center;justify-content:center">No data yet</div>`;
  if(mode==='cumulative'){
    const window=3;
    valid.forEach((x,i)=>{
      const start=Math.max(0,i-window+1);
      const slice=valid.slice(start,i+1);
      x.plot=slice.reduce((a,b)=>a+b.v,0)/slice.length;
    });
  } else {
    valid.forEach(x=>{ x.plot=x.v; });
  }
  const vals=valid.map(x=>x.plot);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const pad=((mx-mn)*0.2)||1;
  const lo=Math.max(0,mn-pad), hi=mx+pad;
  const xStep=(W2-PL-PR)/Math.max(valid.length-1,1);
  const yS=v=>PT+(H-PT-PB)*(1-(v-lo)/((hi-lo)||1));
  const pts=valid.map((x,i)=>({x:PL+i*xStep,y:yS(x.plot),...x}));
  const path=pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const dots=pts.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="8" fill="${DC[p.s.day]||'#888'}" stroke="#fff" stroke-width="2.5"><title>Wk${p.s.wk} ${p.s.day} · ${p.s.tg}</title></circle>`).join('');
  const stride=Math.max(1,Math.floor(pts.length/16));
  const valLabels=pts.map((p,i)=>(i%stride===0||i===pts.length-1)?`<text x="${p.x.toFixed(1)}" y="${(p.y-15).toFixed(1)}" text-anchor="middle" font-size="14" font-weight="700" fill="#333">${p.plot.toFixed(digits)}</text>`:``).join('');
  const gridVals=[lo,lo+(hi-lo)/4,lo+(hi-lo)/2,lo+(hi-lo)*3/4,hi];
  const gridLines=gridVals.map(v=>`<line x1="${PL}" y1="${yS(v).toFixed(1)}" x2="${W2-PR}" y2="${yS(v).toFixed(1)}" stroke="#EFEFE8" stroke-width="1"/>`).join('');
  const yLabels=gridVals.map(v=>`<text x="${PL-11}" y="${(yS(v)+5).toFixed(1)}" text-anchor="end" font-size="14" fill="#888">${v.toFixed(digits)}</text>`).join('');
  const xStride=Math.max(1,Math.floor(pts.length/14));
  const xLbls=pts.map((p,i)=>(i%xStride===0||i===pts.length-1)?`<text x="${p.x.toFixed(1)}" y="${H-PB+26}" text-anchor="middle" font-size="13" fill="#999">W${p.s.wk}</text>`:``).join('');
  return `<svg width="100%" viewBox="0 0 ${W2} ${H}" style="display:block;overflow:visible;min-height:170px">
    ${gridLines}
    <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${H-PB}" stroke="#DDD" stroke-width="1.5"/>
    <line x1="${PL}" y1="${H-PB}" x2="${W2-PR}" y2="${H-PB}" stroke="#DDD" stroke-width="1.5"/>
    ${yLabels}${xLbls}
    <path d="${path}" fill="none" stroke="${color}" stroke-width="3" opacity="0.8" stroke-linejoin="round"/>
    ${dots}
    ${valLabels}
  </svg>`;
}
function trendInfo(sessions,field,digits){
  const vals=sessions.map(s=>{
    const rv=s[field];
    const v=(rv===null||rv===undefined||rv==='')?NaN:parseFloat(rv);
    return v;
  }).filter(v=>!isNaN(v));
  if(!vals.length) return {latest:null,cls:'',text:'No data yet'};
  const latest=vals[vals.length-1];
  let cls='',text='– steady';
  if(vals.length>=2){
    const n=Math.min(3,vals.length);
    const recent=vals.slice(-n);
    const priorLen=Math.min(3,vals.length-n);
    if(priorLen>0){
      const prior=vals.slice(-(n+priorLen),-n);
      const recentAvg=recent.reduce((a,b)=>a+b,0)/recent.length;
      const priorAvg=prior.reduce((a,b)=>a+b,0)/prior.length;
      const diff=recentAvg-priorAvg;
      const threshold=(Math.abs(priorAvg)*0.02)||0.1;
      if(diff>threshold){ cls='up'; text=`▲ ${diff.toFixed(digits)}`; }
      else if(diff<-threshold){ cls='down'; text=`▼ ${Math.abs(diff).toFixed(digits)}`; }
    }
  }
  return {latest,cls,text};
}
function metricCard(sessions,field,label,color,digits,unit,mode){

  </div>`;
}

function combinedChart(sessions,mode){
  const W2=1500,H=440,PL=64,PR=150,PT=26,PB=48;
  if(!sessions.length) return `<div class="chart-empty" style="min-height:260px;display:flex;align-items:center;justify-content:center">No data yet</div>`;
  const metrics=[
    {field:'restHR',label:'Resting HR',color:'#27AE60',digits:0,unit:' bpm'},
    {field:'avgHR',label:'Avg HR',color:'#E74C3C',digits:0,unit:' bpm'},
    {field:'maxHR',label:'Max HR',color:'#C0392B',digits:0,unit:' bpm'},
    {field:'spd',label:'Speed',color:'#185FA5',digits:1,unit:' mph'},
    {field:'energy',label:'RPE',color:'#7B241C',digits:0,unit:'/5'}
  ];
  const xStep=(W2-PL-PR)/Math.max(sessions.length-1,1);
  const xOf=i=>PL+i*xStep;
  const series=metrics.map(m=>{
    const raw=sessions.map((s,i)=>{
      const rv=s[m.field];
      const v=(rv===null||rv===undefined||rv==='')?NaN:parseFloat(rv);
      return {i,s,v};
    }).filter(x=>!isNaN(x.v));
    if(mode==='cumulative'){
      const w=3;
      raw.forEach((x,idx)=>{
        const start=Math.max(0,idx-w+1);
        const slice=raw.slice(start,idx+1);
        x.plot=slice.reduce((a,b)=>a+b.v,0)/slice.length;
      });
    } else { raw.forEach(x=>{ x.plot=x.v; }); }
    return {...m,pts:raw};
  }).filter(m=>m.pts.length>0);
  if(!series.length) return `<div class="chart-empty" style="min-height:260px;display:flex;align-items:center;justify-content:center">No data yet</div>`;
  series.forEach(m=>{
    const vals=m.pts.map(p=>p.plot);
    const mn=Math.min(...vals),mx=Math.max(...vals);
    const range=(mx-mn)||1;
    m.pts.forEach(p=>{ p.norm=(p.plot-mn)/range; });
    m.mn=mn; m.mx=mx;
  });
  const yS=n=>PT+(H-PT-PB)*(1-n);
  const paths=series.map(m=>{
    const d=m.pts.map((p,idx)=>`${idx===0?'M':'L'}${xOf(p.i).toFixed(1)},${yS(p.norm).toFixed(1)}`).join(' ');
    return `<path d="${d}" fill="none" stroke="${m.color}" stroke-width="3" opacity="0.85" stroke-linejoin="round"/>`;
  }).join('');
  const dots=series.map(m=>m.pts.map(p=>
    `<circle cx="${xOf(p.i).toFixed(1)}" cy="${yS(p.norm).toFixed(1)}" r="5.5" fill="${m.color}" stroke="#fff" stroke-width="2"><title>${m.label}: ${p.plot.toFixed(m.digits)}${m.unit} · Wk${p.s.wk} ${p.s.day}</title></circle>`
  ).join('')).join('');
  const xStride=Math.max(1,Math.floor(sessions.length/16));

function computeTrend(sessions,field){
  const valid=sessions.map(s=>{
    const raw=s[field];
    const v=(raw===null||raw===undefined||raw==='')?NaN:parseFloat(raw);
    return {s,v};
  }).filter(x=>!isNaN(x.v));
  const map={};
  const window=3;
  valid.forEach((x,i)=>{
    const start=Math.max(0,i-window+1);
    const slice=valid.slice(start,i+1);
    const avg=slice.reduce((a,b)=>a+b.v,0)/slice.length;
    map[`${x.s.wi}_${x.s.day}`]=avg;
  });
  return map;
}
function exportExcel(paddler){
  if(typeof XLSX==='undefined'){ alert('Excel export library did not load — check your internet connection and try again.'); return; }
  const r=ROSTER.find(x=>rKey(x)===paddler);
  const pName=r?`${r.f} ${r.l}`:paddler;
  const sessions=profileSessions(paddler);
  const DL={mon:'Monday',thu:'Thursday',sat:'Saturday'};
  const fields=[['restHR','Resting HR'],['avgHR','Avg HR'],['maxHR','Max HR'],['spd','Speed (mph)'],['energy','RPE (1-5)']];
  const weeklyRows=sessions.map(s=>{
    const row={Week:s.wk,Day:DL[s.day],Session:s.tg};
    fields.forEach(([f,label])=>{ row[label]=(s[f]===null||s[f]===undefined||s[f]==='')?'':s[f]; });
    row['Nutrition']=s.nutrition||'';
    row['Reflections']=s.notes||'';
    row['Strava']=s.url||'';
    return row;
  });
  const trendMaps={};
  fields.forEach(([f])=>{ trendMaps[f]=computeTrend(sessions,f); });
  const cumulativeRows=sessions.map(s=>{
    const key=`${s.wi}_${s.day}`;
    const row={Week:s.wk,Day:DL[s.day],Session:s.tg};
    fields.forEach(([f,label])=>{
      const v=trendMaps[f][key];
      row[label+' (3-session trend)']=v!==undefined?Number(v.toFixed(1)):'';
    });
    return row;
  });
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(weeklyRows),'Weekly');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(cumulativeRows),'Cumulative Trend');
  const safeName=pName.replace(/[^a-z0-9]+/gi,'_');
  XLSX.writeFile(wb,`${safeName}_Training_Data.xlsx`);
}

  const canLog=mode==='coach'||!!curPaddler;
  document.getElementById('cards').innerHTML=`<div class="prof-page" style="display:block">
    <div class="prof-main" style="padding:16px">
      <div class="prof-name-big" style="font-size:16px;margin-bottom:2px">🏋️ Other Workouts</div>
      <div style="font-size:11px;color:#888;margin-bottom:14px">Strength, mobility, cross-training, recovery, and extra practices — logged by paddlers, visible to the whole team</div>
      ${workoutDraft?workoutDraftForm():(canLog?`<button class="save-btn" onclick="newWorkoutDraft()" style="margin-bottom:14px">+ Log a new entry</button>`:`<div style="font-size:11px;color:#AAA;margin-bottom:14px;font-style:italic">Select your name in the header to log an entry.</div>`)}
      <div class="log-filter-row" style="margin-bottom:12px">
        <button class="ttr-tab-btn${workoutFilter==='all'?' ttr-tab-on':''}" onclick="setWorkoutFilter('all')">Team Log</button>
        <button class="ttr-tab-btn${workoutFilter==='mine'?' ttr-tab-on':''}" onclick="setWorkoutFilter('mine')">My Log</button>
      </div>
      ${workoutEntryRows()}
    </div>
  </div>`;
  const sp=document.getElementById('season-summary');
  if(sp) sp.style.display='none';
  document.getElementById('hint').textContent='Workout log — visible to the whole team';
}
let curWSummaryPaddler='';
window.selWSummaryPaddler=function(k){ curWSummaryPaddler=k; renderWorkoutSummary(); };
window.editFromSummary=function(id){
  view='workoutlog';
  editWorkoutDraft(id);
  render();
};
window.deleteFromSummary=function(id){
  workoutLog=workoutLog.filter(x=>x.id!==id);
  scheduleSave('wlog');
  renderWorkoutSummary();
};
function renderWorkoutSummary(){
  if(!curWSummaryPaddler && ROSTER.length) curWSummaryPaddler=rKey(ROSTER[0]);
  const sideItems=ROSTER.map(r=>{
    const k=rKey(r);
    const cnt=workoutLog.filter(e=>e.paddler===k).length;
    const isSel=k===curWSummaryPaddler;
    return `<div class="pl-item${isSel?' pl-sel':''}" onclick="selWSummaryPaddler('${k}')">
      <span class="pl-name">${r.f} ${r.l}</span>
      <span class="pl-att" style="color:${cnt>0?'#27AE60':'#CCC'}">${cnt}</span>
    </div>`;
  }).join('');
  const r=ROSTER.find(x=>rKey(x)===curWSummaryPaddler);
  const pName=r?`${r.f} ${r.l}`:'';
  const entries=[...workoutLog].filter(e=>e.paddler===curWSummaryPaddler).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const catCounts={};
  entries.forEach(e=>{ catCounts[e.category]=(catCounts[e.category]||0)+1; });
  const catSummary=Object.entries(catCounts).map(([k,v])=>`<span class="wk-cat" style="background:${WCAT_COLORS[k]||'#666'};margin-right:4px">${WCAT_LABELS[k]||k}: ${v}</span>`).join('');
  const rowsHTML=entries.length?entries.map(e=>{
    const hr=(e.avgHR||e.maxHR)?`${e.avgHR||'—'}/${e.maxHR||'—'}`:'—';
    const dist=(e.distance||e.speed)?`${e.distance||'—'} mi @ ${e.speed||'—'} mph`:'—';
    const exList=(e.exercises||[]).length?(e.exercises||[]).map(x=>{
      const detail=[x.sets&&x.reps?`${x.sets}x${x.reps}`:(x.sets||x.reps||''),x.weight].filter(Boolean).join(' @ ');
      return detail?`${esc(x.name)} (${esc(detail)})`:esc(x.name);
    }).join(', '):'—';
    return `<tr class="pt-row">
      <td class="pt-cell pt-wk">${esc(e.date)}</td>
      <td class="pt-cell"><span class="wk-cat" style="background:${WCAT_COLORS[e.category]||'#666'}">${WCAT_LABELS[e.category]||e.category}</span></td>
      <td class="pt-cell pt-sess">${esc(e.activity)}</td>
      <td class="pt-cell" style="white-space:normal;max-width:220px">${exList}</td>
      <td class="pt-cell">${e.duration?e.duration+' min':'—'}</td>
      <td class="pt-cell">${e.rpe?e.rpe+'/10':'—'}</td>
      <td class="pt-cell">${hr}</td>
      <td class="pt-cell">${dist}</td>
    </tr>`;
  }).join(''):`<tr><td colspan="8" class="pt-empty">No workouts logged yet for this paddler</td></tr>`;
  document.getElementById('cards').innerHTML=`<div class="prof-page">
    <div class="pl-sidebar">
      <div class="pl-head">Roster (${ROSTER.length})</div>
      ${sideItems}
    </div>
    <div class="prof-main" style="padding:16px">
      <div class="prof-name-big" style="font-size:16px">${esc(pName)}</div>
      <div style="margin:8px 0 14px">${catSummary||'<span style="font-size:11px;color:#CCC;font-style:italic">No entries yet</span>'}</div>
      <div style="overflow-x:auto">
      <table class="pt-table">
        <thead><tr>
          <th class="pt-th">Date</th><th class="pt-th">Type</th><th class="pt-th">Activity</th>
          <th class="pt-th">Exercises</th><th class="pt-th">Duration</th><th class="pt-th">RPE</th><th class="pt-th">Avg/Max HR</th><th class="pt-th">Distance</th>
        </tr></thead>
        <tbody>${rowsHTML}</tbody>
      </table>
      </div>
    </div>
  </div>`;
  const sp=document.getElementById('season-summary');
  if(sp) sp.style.display='none';
  document.getElementById('hint').textContent='Other Workouts summary — coach only';
}
function seasonSummary(){
  const rows=ROSTER.map(r=>{
    const key=rKey(r);
    let tot=0,pos=0;
    W.forEach((_,wi)=>{
      ['mon','thu','sat'].forEach(day=>{
        pos++;
        if(gPad(key,wi,day,'att')==='y') tot++;
      });
    });
    const pct=pos>0?Math.round((tot/pos)*100):0;
    const clr=pct>=80?'#27AE60':pct>=60?'#F39C12':'#E74C3C';
    const barW=Math.max(pct,2);
    return `<div class="sum-row">
      <div class="sum-name">${r.f} ${r.l.charAt(0)}.</div>
      <div class="sum-bar-track"><div class="sum-bar" style="width:${barW}%;background:${clr}"></div></div>
      <div class="sum-nums" style="color:${clr}">${tot}<span style="color:#BBB;font-weight:400">/${pos}</span></div>
      <div class="sum-pct" style="color:${clr}">${pct}%</div>
    </div>`;
  }).join('');
  const weekCols=W.map((w,wi)=>{
    const cnt=ROSTER.reduce((acc,r)=>acc+['mon','thu','sat'].filter(d=>gPad(rKey(r),wi,d,'att')==='y').length,0);
    const max=ROSTER.length*3;
    const pct=Math.round((cnt/max)*100);
    const clr=pct>=80?'#27AE60':pct>=60?'#F39C12':'#E74C3C';
    const isCur=wi===curWk;
    return `<div class="wt-col${isCur?' wt-cur':''}">
      <div class="wt-wk">Wk${w.n}</div>
      <div class="wt-cnt" style="color:${clr}">${cnt}</div>
      <div class="wt-max">/${max}</div>
    </div>`;
  }).join('');
  const totalAttended=ROSTER.reduce((a,r)=>a+W.reduce((b,_,wi)=>b+['mon','thu','sat'].filter(d=>gPad(rKey(r),wi,d,'att')==='y').length,0),0);
  const totalPossible=ROSTER.length*W.length*3;
  const teamPct=totalPossible>0?Math.round((totalAttended/totalPossible)*100):0;
  const teamClr=teamPct>=80?'#27AE60':teamPct>=60?'#F39C12':'#E74C3C';
  return `<div class="season-panel">
    <div class="season-head">
      <span>Season attendance summary</span>
      <span class="season-totals">
        Team total: <b style="color:${teamClr}">${totalAttended}</b>
        <span style="color:#AAA">/ ${totalPossible} sessions · ${teamPct}%</span>
      </span>
    </div>
    <div class="wt-row">${weekCols}</div>
    <div class="sum-grid">${rows}</div>
  </div>`;
}
function render(){
  if(!dataLoaded) return;
  const crl=document.getElementById('crewRosterList');
  if(crl) crl.innerHTML=ROSTER.map(r=>`<option value="${esc(r.f+' '+r.l)}">`).join('');
  const w=wkData[curWk],ph=PH[w.pk];
  const showWeekNav=(view==='workouts');
  document.getElementById('weekNavBar').style.display=showWeekNav?'flex':'none';
  document.getElementById('dots').style.display=showWeekNav?'flex':'none';
  document.getElementById('nav-wk').textContent=`Week ${w.n} of 11`;
  document.getElementById('nav-dates').textContent=w.dates;
  document.getElementById('nav-phase').innerHTML=`<span class="ph-badge" style="background:${ph.badge}">${ph.label}</span>`;
  document.getElementById('prev').disabled=curWk===0;
  document.getElementById('next').disabled=curWk===W.length-1;
  document.getElementById('dots').innerHTML=W.map((_,i)=>`<div class="dot${i===curWk?' on':''}" style="background:${PH[wkData[i].pk].badge}" onclick="gw(${i})" title="Wk ${i}"></div>`).join('');
  if(view==='profiles'){ renderProfile(); }
  else if(view==='trends'){ renderSeasonTrends(); }
  else   if(view==='rostertt'){ renderRosterTT(); }
  else if(view==='wsummary'){ renderWorkoutSummary(); }
  else if(view==='crews'){ renderCrews(); }
  else if(view==='workoutlog'){ renderWorkout(); }
  else{ document.getElementById('cards').innerHTML=buildCard(curWk,'mon')+buildCard(curWk,'thu')+buildCard(curWk,'sat'); }
  let sp=document.getElementById('season-summary');
  if(mode==='coach'){
    const html=`<div id="season-summary">${seasonSummary()}</div>`;
    if(sp) sp.outerHTML=html;
    else document.getElementById('cards').insertAdjacentHTML('afterend',html);
  } else if(sp) sp.remove();
  document.getElementById('hint').textContent=mode==='coach'
    ?'Coach mode — edit workouts by clicking any text · Roster attendance shown below each session'
    :(curPaddler?`Paddler mode — ${curPaddler} · Workouts are locked · Fill in your session log below each workout`
    :'Paddler mode — select your name in the header to log your sessions');
  const ttNav=document.getElementById('tt-nav');
  if(ttNav){
    if(mode==='coach'){
      let wkStatusCls='save-status', wkStatusTxt='No workout edits yet';
      if(savingKind==='workouts'){ wkStatusCls+=' dirty'; wkStatusTxt='⏳ Saving…'; }
      else if(wkDirty){ wkStatusCls+=' dirty'; wkStatusTxt='⚠ Saving…'; }
      else if(lastSaveError==='workouts'){ wkStatusCls+=' err'; wkStatusTxt='✕ Save failed'; }
      else if(lastSavedWorkouts){ wkStatusCls+=' ok'; wkStatusTxt=`✓ Saved ${timeAgo(lastSavedWorkouts)}`; }
      ttNav.innerHTML=`<div style="display:flex;gap:8px;padding:5px 16px 0;border-top:1px solid #E8E8E0;margin-top:5px;align-items:center;flex-wrap:wrap">
        <button class="tt-nav-btn${view==='workouts'?' tt-nav-on':''}" onclick="switchView('workouts')">Weekly plan</button>
        <button class="tt-nav-btn${view==='profiles'?' tt-nav-on':''}" onclick="switchView('profiles')">👤 Profiles</button>
        <button class="tt-nav-btn${view==='trends'?' tt-nav-on':''}" onclick="switchView('trends')">📈 Season Trends</button>
        <button class="tt-nav-btn${view==='rostertt'?' tt-nav-on':''}" onclick="switchView('rostertt')">🏁 Roster TT</button>
        <button class="tt-nav-btn${view==='wsummary'?' tt-nav-on':''}" onclick="switchView('wsummary')">📊 Workout Summary</button>
        <button class="tt-nav-btn${view==='crews'?' tt-nav-on':''}" onclick="switchView('crews')">🛶 Crews</button>
        <span class="coach-save-bar"><span class="${wkStatusCls}">${wkStatusTxt}</span></span>
        <button class="tt-nav-btn" style="opacity:.6;font-size:10px" onclick="lockCoach();setMode('paddler')" title="Lock coach mode">🔒 Lock</button>
      </div>`;
    } else ttNav.innerHTML='';
  }
  document.getElementById('btn-c').classList.toggle('on',mode==='coach');
  document.getElementById('btn-p').classList.toggle('on',mode==='paddler');
  document.getElementById('btn-workout').classList.toggle('on',view==='workoutlog');
  document.getElementById('who-wrap').style.display=mode==='paddler'?'flex':'none';
  if(editF){const el=document.getElementById(editF.id);if(el){el.focus();const l=el.value.length;el.setSelectionRange(l,l);}}
}
function initSelect(){
  const sel=document.getElementById('who-select');
  ROSTER.forEach(r=>{
    const k=rKey(r),opt=document.createElement('option');
    opt.value=k;opt.textContent=`${r.f} ${r.l}`;
    if(k===curPaddler) opt.selected=true;
    sel.appendChild(opt);
  });
}
let pinBuffer='';
function showPin(){ pinBuffer=''; updateDots(); document.getElementById('pin-error').textContent=''; document.getElementById('pin-overlay').style.display='flex'; }
function hidePin(){ document.getElementById('pin-overlay').style.display='none'; pinBuffer=''; }
function updateDots(){ for(let i=0;i<4;i++) document.getElementById('pd'+i).className='pin-dot'+(i<pinBuffer.length?' filled':''); }
window.pinKey=function(k){
  if(pinBuffer.length>=COACH_PIN.length) return;
  pinBuffer+=k; updateDots();
  if(pinBuffer.length===COACH_PIN.length){
    if(pinBuffer===COACH_PIN){ authCoach(); hidePin(); mode='coach'; view='workouts'; render(); }
    else{ document.getElementById('pin-error').textContent='Incorrect PIN — try again'; pinBuffer=''; updateDots(); setTimeout(()=>document.getElementById('pin-error').textContent='',2000); }
  }
};
window.pinClear=function(){ pinBuffer=pinBuffer.slice(0,-1); updateDots(); };
window.pinCancel=function(){ hidePin(); };
window.requestCoach=function(){ if(isCoachAuthed()){ mode='coach'; view='workouts'; render(); } else showPin(); };
window.switchView=v=>{view=v;editF=null;render();};
window.setMode=m=>{ mode=m; editF=null; render(); };
window.selectPaddler=v=>{ curPaddler=v; localStorage.setItem('pal_who',v); render(); };
window.gw=n=>{editF=null;curWk=n;render();};
window.pw=()=>{if(curWk>0){editF=null;curWk--;render();}};
window.nw=()=>{if(curWk<W.length-1){editF=null;curWk++;render();}};
window.eCoach=(id,wk,day,fk)=>{editF={id,wk,day,fk};render();};
window.sCoach=(id,wk,day,fk)=>{const el=document.getElementById(id);if(el){wkData[wk][day][fk]=el.value;sWk();}editF=null;render();};
window.sAtt=(p,wk,day)=>{const cur=gPad(p,wk,day,'att','');sPad(p,wk,day,'att',cur==='y'?'':'y');};
window.manualSaveLogs=manualSaveLogs;
loadAll();
</script>
<div id="pin-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:center;justify-content:center">
  <div id="pin-box" style="background:#fff;border-radius:14px;padding:28px 32px;width:280px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.18)">
    <div style="font-size:28px;margin-bottom:10px">🔒</div>
    <div style="font-size:15px;font-weight:700;color:#0D1B2A;margin-bottom:4px">Coach access</div>
    <div style="font-size:11px;color:#888;margin-bottom:18px">Enter your PIN to continue</div>
    <div id="pin-dots" style="display:flex;justify-content:center;gap:10px;margin-bottom:18px">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div id="pin-error" style="color:#E74C3C;font-size:11px;min-height:14px;margin-bottom:8px"></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px">
      <button class="pin-key" onclick="pinKey('1')">1</button><button class="pin-key" onclick="pinKey('2')">2</button><button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button><button class="pin-key" onclick="pinKey('5')">5</button><button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button><button class="pin-key" onclick="pinKey('8')">8</button><button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key pin-clear" onclick="pinClear()">⌫</button><button class="pin-key" onclick="pinKey('0')">0</button><button class="pin-key pin-cancel" onclick="pinCancel()">✕</button>
    </div>
  </div>
</div>
</body>
</html>
